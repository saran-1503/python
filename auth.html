{% extends "base.html" %}

{% block content %}
<div class="auth-container glass-card">
    {% if is_login %}
        <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label class="form-label" for="email">College Email</label>
                <input type="email" class="form-control" id="email" name="email" required placeholder="student@college.edu">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-submit">Login</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
            Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--primary-color);">Register here</a>
        </p>
    {% else %}
        <h2 style="text-align: center; margin-bottom: 2rem;">Create Account</h2>
        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label class="form-label" for="name">Full Name</label>
                <input type="text" class="form-control" id="name" name="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label class="form-label" for="email">College Email</label>
                <input type="email" class="form-control" id="email" name="email" required placeholder="student@college.edu">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-submit">Register</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
            Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary-color);">Login here</a>
        </p>
    {% endif %}
</div>
{% endblock %}
